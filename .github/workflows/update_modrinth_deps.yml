name: Update Modrinth Dependencies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ['master', '1.21.11-neoforge']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Update Modrinth Dependencies
        uses: Wurst-Imperium/update-modrinth-deps@v1
